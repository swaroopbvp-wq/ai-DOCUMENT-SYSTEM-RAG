<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
AI Document Intelligence
</title>

<link
rel="stylesheet"
href="/static/style.css">

</head>

<body>

<!-- =====================
TOP BAR
===================== -->

<div class="top-bar">

    <!-- RECENTS -->

    <div class="dropdown">

        <button
        class="dropbtn"
        id="recentsBtn">
        📂 Recents ▼
        </button>

        <div
        class="dropdown-content"
        id="recentsList">

            <p>
            No recent files
            </p>

        </div>

    </div>


    <!-- SETTINGS -->

    <div class="settings">

        <button
        id="settingsBtn"
        type="button">
        ⚙️
        </button>

        <div
        id="settingsPanel"
        class="settings-panel">

            <p>
            Appearance
            </p>

            <button
            id="lightModeBtn">
            ☀️ Light Mode
            </button>

            <button
            id="darkModeBtn">
            🌙 Dark Mode
            </button>

        </div>

    </div>

</div>



<!-- =====================
MAIN CONTAINER
===================== -->

<div class="container">

    <h2 id="greetingMsg">
    Hello!
    </h2>

    <h1>
    📄 AI Document Intelligence
    </h1>

    <p>
    Ask intelligent questions from your uploaded documents
    </p>


    <!-- =====================
FILE INFO
===================== -->

<p id="fileDetails"></p>


<!-- =====================
SEARCH MODE
===================== -->



<!-- =====================
QUESTION BAR
===================== -->

<div class="input-group">

    <button
    id="addFileBtn"
    type="button">
    +
    </button>

    <input
    type="text"
    id="questionInput"
    placeholder="Ask anything about your documents...">

</div>


    <!-- Hidden File Input -->

    <input
    type="file"
    id="fileInput"
    multiple
    style="display:none">


    <!-- =====================
    SUBMIT
    ===================== -->

    <button
    id="submitBtn"
    type="button">
    Submit
    </button>


    <!-- =====================
    CHAT AREA
    ===================== -->

    <div
    id="responseBox">
    </div>


    <!-- =====================
    LOADING
    ===================== -->

    <div
    id="loading"
    class="loading hidden">

        🤖 Thinking

        <span
        class="dots">
        </span>

    </div>


    <!-- =====================
    MESSAGE BOX
    ===================== -->

    <div
    id="messageBox">
    </div>

</div>



<!-- =====================
CHATBOT
===================== -->

<div
class="chatbot-wrapper">

    <div
    class="chatbot-button"
    id="chatbotToggle">
    💬
    </div>

    <div
    class="chatbot-panel"
    id="chatbotPanel">

        <input
        type="text"
        id="chatbotQuery"
        placeholder="Type your query...">

        <button
        id="chatbotSend"
        type="button">
        Send
        </button>

    </div>

</div>



<!-- =====================
SCRIPT
===================== -->

<script
src="/static/script.js">
</script>

</body>

</html>
